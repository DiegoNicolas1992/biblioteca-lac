<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Préstamos</title>

<link rel="stylesheet" href="css/styles.css">

<script>

if(!sessionStorage.getItem("usuarioLogueado")){
window.location.href="login.html";
}

</script>

</head>

<body>

<header>

<h1>Biblioteca LAC - Gestión de Préstamos</h1>

</header>

<nav>

<ul>

<li><a href="index.html">Inicio</a></li>

<li><a href="socios.html">Socios</a></li>

<li><a href="libros.html">Libros</a></li>

<li><a href="reportes.html">Reportes</a></li>

<li>
<a href="#" onclick="cerrarSesion()">
Cerrar Sesión
</a>
</li>

</ul>

</nav>

<main>

<div class="login-container">

<h2>Registrar Préstamo</h2>

<input
type="text"
id="dni"
placeholder="DNI del Socio">

<input
type="text"
id="codigo"
placeholder="Código del Libro">

<label>Fecha del préstamo</label>

<input
type="date"
id="fechaPrestamo">

<label>Fecha de devolución</label>

<input
type="date"
id="fechaDevolucion">

<button onclick="guardarPrestamo()">

Registrar Préstamo

</button>

<p id="mensaje"></p>

<hr>

<h2>Buscar Préstamo</h2>

<input
type="text"
id="buscar"
placeholder="Buscar por DNI o Código"
onkeyup="buscarPrestamo()">

<h3>

Total de Préstamos:

<span id="totalPrestamos">

0

</span>

</h3>

<table>

<thead>

<tr>

<th>DNI</th>

<th>Libro</th>

<th>Fecha Préstamo</th>

<th>Fecha Devolución</th>

<th>Estado</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaPrestamos">

</tbody>

</table>

</div>

</main>

<script src="js/prestamos.js"></script>

<script>

function cerrarSesion(){

sessionStorage.clear();

window.location.href="login.html";

}

</script>

</body>

</html>
