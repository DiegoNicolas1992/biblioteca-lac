<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Gestión de Préstamos</title>

<link rel="stylesheet"
href="css/styles.css">

<script>

if(!sessionStorage.getItem("usuarioLogueado")){
window.location.href="login.html";
}

</script>

</head>

<body>

<header>

<h1>Biblioteca LAC</h1>

<h2>Gestión de Préstamos</h2>

</header>

<nav>

<ul>

<li><a href="index.html">🏠 Inicio</a></li>

<li><a href="socios.html">👥 Socios</a></li>

<li><a href="libros.html">📚 Libros</a></li>

<li><a href="reportes.html">📊 Reportes</a></li>

<li>
<a href="#" onclick="cerrarSesion()">
🚪 Cerrar Sesión
</a>
</li>

</ul>

</nav>

<main>

<div class="login-container">

<h2>

Registrar Préstamo

</h2>

<label>

Socio

</label>

<select id="dni">

<option value="">

Seleccione un socio

</option>

</select>

<label>

Libro

</label>

<select id="codigo">

<option value="">

Seleccione un libro

</option>

</select>

<label>

Fecha del préstamo

</label>

<input

type="date"

id="fechaPrestamo">

<label>

Fecha devolución

</label>

<input

type="date"

id="fechaDevolucion">

<button

onclick="guardarPrestamo()">

Registrar Préstamo

</button>

<p id="mensaje"></p>

<hr>

<h2>

Buscar préstamo

</h2>

<input

type="text"

id="buscar"

placeholder="Buscar por socio o libro"

onkeyup="buscarPrestamo()">

<h3>

Préstamos registrados:

<span id="totalPrestamos">

0

</span>

</h3>

<table>

<thead>

<tr>

<th>Socio</th>

<th>Libro</th>

<th>Préstamo</th>

<th>Devolución</th>

<th>Estado</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaPrestamos">

  </tbody>

</table>

</div>

</main>

<script src="js/prestamos.js"></script>

<script>

function cerrarSesion(){

sessionStorage.clear();

window.location.href="login.html";

}

window.onload = function(){

let hoy = new Date();

let fechaHoy = hoy.toISOString().split("T")[0];

document.getElementById("fechaPrestamo").value = fechaHoy;

let devolucion = new Date();

devolucion.setDate(devolucion.getDate()+15);

let fechaDev = devolucion.toISOString().split("T")[0];

document.getElementById("fechaDevolucion").value = fechaDev;

}

</script>

</body>

</html>
