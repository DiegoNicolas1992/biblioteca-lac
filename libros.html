<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Libros</title>

<link rel="stylesheet" href="css/styles.css">

<script>

if(!sessionStorage.getItem("usuarioLogueado")){
window.location.href="login.html";
}

</script>

</head>

<body>

<header>

<h1>Biblioteca LAC - Gestión de Libros</h1>

</header>

<nav>

<ul>

<li><a href="index.html">Inicio</a></li>

<li><a href="socios.html">Socios</a></li>

<li><a href="prestamos.html">Préstamos</a></li>

<li><a href="reportes.html">Reportes</a></li>

<li>
<a href="#" onclick="cerrarSesion()">
Cerrar Sesión
</a>
</li>

</ul>

</nav>

<main>

<div class="login-container">

<h2>Alta / Modificación de Libros</h2>

<input
type="text"
id="codigo"
placeholder="Código">

<input
type="text"
id="titulo"
placeholder="Título del Libro">

<input
type="text"
id="autor"
placeholder="Autor">

<input
type="text"
id="editorial"
placeholder="Editorial">

<input
type="number"
id="anio"
placeholder="Año">

<input
type="text"
id="categoria"
placeholder="Categoría">

<select id="estado">

<option value="Disponible">
Disponible
</option>

<option value="Prestado">
Prestado
</option>

</select>

<button
id="btnGuardar"
onclick="guardarLibro()">
Guardar Libro
</button>

<button
id="btnActualizar"
onclick="actualizarLibro()"
style="display:none;">
Actualizar Libro
</button>

<p id="mensaje"></p>

<hr>

<h2>Buscar Libro</h2>

<input
type="text"
id="buscar"
placeholder="Buscar por Código, Título o Autor"
onkeyup="buscarLibro()">

<h3>

Total de Libros:

<span id="totalLibros">
0
</span>

</h3>

<table>

<thead>

<tr>

<th>Código</th>

<th>Título</th>

<th>Autor</th>

<th>Editorial</th>

<th>Año</th>

<th>Categoría</th>

<th>Estado</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaLibros">

</tbody>

</table>

</div>

</main>

<script src="js/libros.js"></script>

<script>

function cerrarSesion(){

sessionStorage.clear();

window.location.href="login.html";

}

</script>

</body>

</html>
