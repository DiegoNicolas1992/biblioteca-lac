<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gestión de Socios</title>

<link rel="stylesheet" href="css/styles.css">

<script>

if(!sessionStorage.getItem("usuarioLogueado")){
    window.location.href="login.html";
}

</script>

</head>

<body>

<header>

<h1>Biblioteca LAC - Gestión de Socios</h1>

</header>

<nav>

<ul>

<li><a href="index.html">Inicio</a></li>

<li><a href="libros.html">Libros</a></li>

<li><a href="prestamos.html">Préstamos</a></li>

<li><a href="reportes.html">Reportes</a></li>

<li>
<a href="#" onclick="cerrarSesion()">
Cerrar Sesión
</a>
</li>

</ul>

</nav>

<main>

<div class="login-container">

<h2>Alta / Modificación de Socios</h2>

<input
type="text"
id="dni"
placeholder="DNI">

<input
type="text"
id="nombre"
placeholder="Nombre">

<input
type="text"
id="apellido"
placeholder="Apellido">

<input
type="text"
id="telefono"
placeholder="Teléfono">

<input
type="email"
id="email"
placeholder="Correo Electrónico">

<input
type="text"
id="domicilio"
placeholder="Domicilio">

<button id="btnGuardar" onclick="guardarSocio()">
Guardar Socio
</button>

<button id="btnActualizar" onclick="actualizarSocio()" style="display:none;">
Actualizar Socio
</button>

<p id="mensaje"></p>

<hr>

<h2>Buscar Socio</h2>

<input
type="text"
id="buscar"
placeholder="Buscar por DNI, Nombre o Apellido"
onkeyup="buscarSocio()">

<h3>
Total de Socios:
<span id="totalSocios">0</span>
</h3>

<table>

<thead>

<tr>

<th>DNI</th>

<th>Nombre</th>

<th>Apellido</th>

<th>Teléfono</th>

<th>Email</th>

<th>Domicilio</th>

<th>Acciones</th>

</tr>

</thead>

<tbody id="tablaSocios">

</tbody>

</table>

</div>

</main>

<script src="js/socios.js"></script>

<script>

function cerrarSesion(){

sessionStorage.clear();

window.location.href="login.html";

}

</script>

</body>

</html>
¿Qué cambia?
